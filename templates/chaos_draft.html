{% extends "base.html" %}

{% block title %}iMomir - Chaos Draft{% endblock %}

{% block content %}
<div
    class="screen"
    id="chaosDraftScreen"
    data-open-print-in-new-tab="{{ '1' if open_print_in_new_tab else '0' }}"
    data-sound-enabled="{{ '1' if sound_enabled else '0' }}"
>
    <div class="page-panel chaos-draft-header-panel">
        <div class="chaos-draft-header-layout">
            <div class="chaos-draft-header-copy">
                <h1 class="page-title">Chaos Draft</h1>
                <p class="page-subtitle">
                    Spin to select a random booster pack from the currently enabled sets.
                </p>
            </div>

            <div class="chaos-draft-top-actions">
                <button type="button" id="chaosNextButton" class="chaos-draft-next-button" disabled>
                    <span class="chaos-draft-next-button-label">Next Pack</span>
                    <span class="chaos-draft-next-button-arrow">▷</span>
                </button>
            </div>
        </div>
    </div>

    <div id="chaosDraftMessage" class="card-placeholder hidden">
        Click Spin to generate a Chaos Draft pack selection.
    </div>

    <div id="chaosDraftSpinner" class="chaos-draft-spinner-shell">
        <div class="chaos-draft-spinner-window">
            <div id="chaosDraftPointer" class="chaos-draft-pointer hidden">
                <img src="{{ url_for('static', filename='img/packpointer_gold.png') }}" alt="Pack Pointer">
            </div>

            <div id="chaosDraftIdleCta" class="chaos-draft-idle-cta">
                <button type="button" id="chaosSpinButton" class="chaos-draft-spin-cta">
                    <img
                        src="{{ url_for('static', filename='img/spinlogo1.png') }}"
                        alt="Spin"
                        class="chaos-draft-spin-cta-image"
                    >
                </button>
            </div>

            <div id="chaosDraftSpinnerTrack" class="chaos-draft-spinner-track hidden"></div>
        </div>
    </div>

    <div id="chaosDraftOpenRow" class="chaos-draft-open-row">
        <button type="button" id="chaosOpenButton" class="action-button chaos-draft-open-button" disabled>
            Open Pack
        </button>
    </div>

<div id="chaosDraftBusyOverlay" class="chaos-draft-busy-overlay hidden" aria-hidden="true">
    <div class="chaos-draft-busy-backdrop"></div>
    <div class="chaos-draft-busy-card">
            <div class="chaos-draft-busy-spinner"></div>
            <div id="chaosDraftBusyTitle" class="chaos-draft-busy-title">Opening Pack</div>
            <div id="chaosDraftBusyText" class="chaos-draft-busy-text">
                Relax while we crack your Pack!
            </div>
        </div>
    </div>
</div>
{% endblock %}
