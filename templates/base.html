<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}iMomir{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <div class="app-shell">
      <div class="app-frame">
        <nav class="app-tabs" aria-label="Primary">
          <div class="app-tabs-left">
            <img
              src="{{ url_for('static', filename='img/iMomirLogo_1.png') }}"
              alt="iMomir"
              class="app-logo"
            >
          </div>
          <div class="app-tabs-nav">
            <a
              class="app-tab {% if request.endpoint in ['index', 'result'] %}app-tab-active{% endif %}"
              href="{{ url_for('index') }}"
            >
              Result
            </a>

            <a
              class="app-tab {% if request.endpoint == 'sets' %}app-tab-active{% endif %}"
              href="{{ url_for('sets') }}"
            >
              Sets
            </a>

            <a
              class="app-tab {% if request.endpoint == 'config' %}app-tab-active{% endif %}"
              href="{{ url_for('config') }}"
            >
              Modes
            </a>

            <a
              class="app-tab {% if request.endpoint == 'card_search' %}app-tab-active{% endif %}"
              href="{{ url_for('card_search') }}"
            >
              Card Search
            </a>
          </div>
          <div class="app-tabs-right">
            <a
              class="app-gear-button"
              href="{{ url_for('config') }}?open=print_defaults,card_database&scroll=print_defaults"
              aria-label="Open Config shortcuts"
              title="Open Print Defaults and Card Database"
            >
              <i class="fa-solid fa-gear"></i>
            </a>
          </div>
        </nav>
        {% block content %}{% endblock %}
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
